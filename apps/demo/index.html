<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenScope Demo</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>OpenScope</h1>
    <p class="subtitle">Open Source Video Scope Engine</p>
  </header>

  <div class="controls">
    <label class="file-input">
      <input type="file" id="fileInput" accept="video/*,image/*" />
      Load File
    </label>
    <button id="webcamBtn">Webcam</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="waveformModeBtn">Waveform: Luma</button>
    <span id="status">No source loaded</span>
  </div>

  <div class="layout">
    <div class="source-panel">
      <div class="panel-label">Source</div>
      <video id="video" muted playsinline></video>
      <canvas id="imageCanvas" style="display:none"></canvas>
    </div>

    <div class="scope-panel" data-scope="waveform">
      <div class="panel-label">Waveform</div>
      <canvas id="canvas-waveform" role="img" aria-label="Waveform scope display"></canvas>
      <canvas id="overlay-waveform" class="scope-overlay"></canvas>
      <span class="scope-badge" id="badge-waveform"></span>
    </div>

    <div class="scope-panel" data-scope="rgbParade">
      <div class="panel-label">RGB Parade</div>
      <canvas id="canvas-rgbParade" role="img" aria-label="RGB Parade scope display"></canvas>
      <canvas id="overlay-rgbParade" class="scope-overlay"></canvas>
      <span class="scope-badge" id="badge-rgbParade"></span>
    </div>

    <div class="scope-panel" data-scope="vectorscope">
      <div class="panel-label">Vectorscope</div>
      <canvas id="canvas-vectorscope" role="img" aria-label="Vectorscope scope display"></canvas>
      <canvas id="overlay-vectorscope" class="scope-overlay"></canvas>
      <span class="scope-badge" id="badge-vectorscope"></span>
    </div>

    <div class="scope-panel" data-scope="histogram">
      <div class="panel-label">Histogram</div>
      <canvas id="canvas-histogram" role="img" aria-label="Histogram scope display"></canvas>
      <canvas id="overlay-histogram" class="scope-overlay"></canvas>
      <span class="scope-badge" id="badge-histogram"></span>
    </div>

    <div class="scope-panel" data-scope="falseColor">
      <div class="panel-label">False Color</div>
      <canvas id="canvas-falseColor" role="img" aria-label="False Color scope display"></canvas>
      <canvas id="overlay-falseColor" class="scope-overlay"></canvas>
      <span class="scope-badge" id="badge-falseColor"></span>
    </div>
  </div>

  <footer id="footer">
    <a href="https://github.com/openscope" target="_blank">GitHub</a>
    &middot; MIT License &middot; <span id="renderMode">WebGPU + Canvas 2D</span>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
